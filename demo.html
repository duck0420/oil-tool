<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>油資申請工具 — 示範頁面</title>
<style>
:root {
  --bg: #faf6f0; --card: #fffdf7; --card2: #f8f2e8;
  --border: #e5d9c4; --text: #3d2e1c; --muted: #a89880;
  --accent: #c4963c; --accent2: #d4a84b; --accent-light: #f5e8cf;
  --green: #7a9a6e; --orange: #d4956a; --red: #c47360;
  --holiday-bg: #faf0e4; --weekend-bg: #f3ede4;
  --bike: #8b7aa0; --car: #d4956a;
  --shadow: 0 1px 3px rgba(61,46,28,0.06);
  --radius: 14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;padding-bottom:40px}

/* Banner */
.demo-banner{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-align:center;padding:10px 16px;font-size:0.85rem;font-weight:600}
.demo-banner a{color:#fff;text-decoration:underline;margin-left:8px;font-weight:400;font-size:0.8rem}

.bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.bar .title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.bar .sub{font-size:0.8rem;color:var(--muted)}
.main{max-width:800px;margin:0 auto;padding:16px}

.month-nav{display:flex;align-items:center;justify-content:center;padding:8px 0;margin-bottom:8px}
.month-nav h2{font-size:1.2rem;font-weight:700}

.calendar{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:10px 0;font-size:0.75rem;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border)}
.cal-header span:first-child,.cal-header span:last-child{color:var(--red)}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:0.82rem;font-weight:500;min-height:44px;border-radius:4px}
.cal-cell:hover{background:var(--accent-light)}
.cal-cell .num{position:relative;z-index:1}
.cal-cell.weekend{color:var(--muted);background:var(--weekend-bg)}
.cal-cell.holiday{color:var(--red);background:var(--holiday-bg)}
.cal-cell.today{font-weight:800}
.cal-cell.today .num::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent)}
.cal-cell.active{background:var(--accent);color:#fff;border-radius:10px}
.cal-cell .badge{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.cal-cell.empty{cursor:default}
.cal-cell.empty:hover{background:none}

.legend{display:flex;gap:16px;font-size:0.7rem;color:var(--muted);padding:6px 0;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.legend .dot.work{background:var(--green)}

.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card h3{font-size:0.95rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card .date-title{font-size:1rem;font-weight:700;color:var(--accent)}

/* Editor (read-only style) */
.segment{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.segment:last-child{border-bottom:none}
.segment .seg-body{flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.segment .loc{font-size:0.82rem;min-width:110px}
.segment .arrow{color:var(--accent);font-weight:bold}
.segment .km{font-weight:700;color:var(--accent);font-size:0.85rem;width:55px;text-align:center}
.segment .cat{font-size:0.75rem;color:var(--muted);width:120px}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat-card{background:var(--card2);border-radius:10px;padding:14px;text-align:center}
.stat-card .val{font-size:1.4rem;font-weight:700}
.stat-card .val.gold{color:var(--accent)}
.stat-card .val.green{color:var(--green)}
.stat-card .lbl{font-size:0.7rem;color:var(--muted);margin-top:2px}

.vehicle-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.75rem;font-weight:600}
.vehicle-badge.car{background:var(--car);color:#fff}
.vehicle-badge.bike{background:var(--bike);color:#fff}
</style>
</head>
<body>

<div class="demo-banner">
  🎨 這是示範頁面，資料皆為虛構 — <a href="index.html">→ 使用真實工具</a>
</div>

<div class="bar">
  <div><span class="title">☕ 油資申請</span><span class="sub">Demo 示範</span></div>
  <div style="font-size:0.8rem;color:var(--muted)">🚗 汽車</div>
</div>

<div class="main">

<div class="month-nav"><h2 id="monthLabel"></h2></div>

<div class="calendar">
  <div class="cal-header"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
  <div class="cal-body" id="calBody"></div>
</div>
<div class="legend">
  <span><span class="dot work"></span> 有行程</span>
  <span style="color:var(--muted)">週末/假日自動跳過</span>
</div>

<div class="card" id="editor">
  <div class="date-title" id="editorTitle">選擇日期</div>
  <div id="segmentsList" style="margin-top:8px"></div>
</div>

<div class="card">
  <h3>📊 當月統計</h3>
  <div class="stats" id="monthStats"></div>
</div>

<div class="card" style="text-align:center">
  <h3>💡 這個工具能做什麼？</h3>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;font-size:0.85rem;text-align:left;margin-top:8px">
    <div>📅 日曆式外勤登錄，一鍵套用預設路線</div>
    <div>🚗 汽機車自動切換里程計算</div>
    <div>📊 月結自動統計里程與油資</div>
    <div>📥 一鍵匯出 Excel（外勤表＋差旅費申請單）</div>
    <div>☁️ Firebase 雲端同步，手機電腦即時互通</div>
    <div>👥 多人支援，資料獨立儲存</div>
  </div>
</div>

</div>

<script>
// ============ FAKE DATA ============
const TEMPLATE = [
  {from:'台中分公司',to:'關務署台中關',km:20.2,cat:'總部至海關文件'},
  {from:'關務署台中關',to:'陽明海運梧棲辦公室',km:1.7,cat:'查看有無文件可取回'},
  {from:'陽明海運梧棲辦公室',to:'安舫船務',km:0.5,cat:'查看有無文件可取回'},
  {from:'安舫船務',to:'建中船務',km:0.26,cat:'查看有無文件可取回'},
  {from:'建中船務',to:'龍鑫船務',km:0.026,cat:'查看有無文件可取回'},
  {from:'龍鑫船務',to:'國耀船務',km:0.55,cat:'查看有無文件可取回'},
  {from:'國耀船務',to:'顗泰船務',km:1,cat:'查看有無文件可取回'},
  {from:'顗泰船務',to:'關務署台中關',km:1,cat:'查看有無文件可取回'},
  {from:'關務署台中關',to:'31碼頭',km:3.6,cat:'櫃場作業'},
  {from:'31碼頭',to:'32碼頭',km:1.2,cat:'櫃場作業'},
  {from:'32碼頭',to:'34碼頭',km:0.6,cat:'櫃場作業'},
  {from:'34碼頭',to:'關務署台中關',km:3.3,cat:'回海關'},
];

const now = new Date();
const Y = now.getFullYear(), M = now.getMonth();
const DAYS = new Date(Y,M+1,0).getDate();
const TODAY = now.toISOString().slice(0,10);

// Seeded pseudo-random for consistent demo data
function seeded(seed){let s=seed;return ()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;};}
const rng = seeded(Y*100+M+1);

// Generate demo data: ~60-70% of workdays have trips, some with variations
const demoData = {};
for(let d=1;d<=DAYS;d++){
  const ds = `${Y}-${String(M+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const dow = new Date(Y,M,d).getDay();
  if(dow===0||dow===6) continue;
  if(rng() > 0.65) continue; // ~65% of workdays
  
  const segs = JSON.parse(JSON.stringify(TEMPLATE));
  // Randomize: sometimes use bike, sometimes drop last segments
  const v = rng() > 0.25 ? '汽車' : '機車';
  if(rng() > 0.7) segs.pop(); // drop last
  if(rng() > 0.85 && segs.length>8) segs.splice(6,2);
  
  demoData[ds] = {enabled:true, vehicle:v, segments:segs};
}

let selDate = TODAY;
let selData = demoData[TODAY] || null;

// ============ RENDER ============
function fmt(d){return isNaN(d)?'':d;}
function renderCalendar(){
  document.getElementById('monthLabel').textContent = `${Y} 年 ${M+1} 月`;
  const firstDay = new Date(Y,M,1).getDay();
  let html='';
  for(let i=0;i<firstDay;i++) html+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=DAYS;d++){
    const ds = `${Y}-${String(M+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(Y,M,d).getDay();
    const isWeekend = dow===0||dow===6;
    const hasTrips = !!demoData[ds];
    const active = ds===selDate;
    let cls='cal-cell';
    if(isWeekend) cls+=' weekend';
    if(ds===TODAY) cls+=' today';
    if(active) cls+=' active';
    html+=`<div class="${cls}" onclick="selectDay('${ds}')"><span class="num">${d}</span>${hasTrips?'<span class="badge"></span>':''}</div>`;
  }
  document.getElementById('calBody').innerHTML = html;
  renderStats();
}

function renderEditor(){
  const title = document.getElementById('editorTitle');
  title.textContent = `📅 ${selDate}`;
  const list = document.getElementById('segmentsList');
  if(!selData || !selData.segments || selData.segments.length===0){
    list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;font-size:0.85rem">本日無行程</div>';
    return;
  }
  const v = selData.vehicle || '汽車';
  const vc = v==='汽車'?'car':'bike';
  let html=`<div style="margin-bottom:8px"><span class="vehicle-badge ${vc}">${v==='汽車'?'🚗 汽車':'🏍️ 機車'}</span></div>`;
  selData.segments.forEach(s=>{
    html+=`<div class="segment"><div class="seg-body"><span class="loc">${s.from}</span><span class="arrow">→</span><span class="loc">${s.to}</span><span class="km">${s.km} km</span><span class="cat">${s.cat}</span></div></div>`;
  });
  list.innerHTML = html;
}

function renderStats(){
  let workDays=0, tripSegs=0, totalKm=0, bikeKm=0, carKm=0;
  const rBike=4, rCar=8;
  for(let d=1;d<=DAYS;d++){
    const ds = `${Y}-${String(M+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(Y,M,d).getDay();
    if(dow===0||dow===6) continue;
    const data = demoData[ds];
    if(!data || !data.enabled || !data.segments) continue;
    workDays++;
    const v = data.vehicle || '汽車';
    data.segments.forEach(s=>{
      tripSegs++;
      const cnt = (s.from==='台中分公司'&&s.to==='關務署台中關')?1:2;
      const km = s.km*cnt;
      totalKm+=km;
      if(v==='機車') bikeKm+=km; else carKm+=km;
    });
  }
  const money = bikeKm*rBike + carKm*rCar;
  document.getElementById('monthStats').innerHTML=`
    <div class="stat-card"><div class="val">${workDays}</div><div class="lbl">工作天數</div></div>
    <div class="stat-card"><div class="val">${tripSegs}</div><div class="lbl">行程段數</div></div>
    <div class="stat-card"><div class="val gold">${totalKm.toFixed(1)}</div><div class="lbl">總里程 km</div></div>
    <div class="stat-card"><div class="val gold">${bikeKm.toFixed(1)}</div><div class="lbl">🏍️ 機車 km</div></div>
    <div class="stat-card"><div class="val gold">${carKm.toFixed(1)}</div><div class="lbl">🚗 汽車 km</div></div>
    <div class="stat-card"><div class="val green">$${money.toFixed(0)}</div><div class="lbl">💰 預估油資</div></div>
  `;
}

function selectDay(ds){
  selDate = ds;
  selData = demoData[ds] || null;
  renderEditor();
  renderCalendar();
}

renderCalendar();
renderEditor();
</script>
</body>
</html>
